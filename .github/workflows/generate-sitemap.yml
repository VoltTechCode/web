name: تحديث sitemap.xml تلقائيًا

on:
  schedule:
    - cron: "0 3 * * *"   # كل يوم الساعة 3 صباحًا UTC — غيّرها براحتك
  workflow_dispatch:        # يسمح بتشغيله يدويًا من تبويب Actions في GitHub

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Write service account key from secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json

      - name: Generate sitemap.xml
        run: python generate_sitemap.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "تحديث sitemap.xml تلقائيًا"
          git push
